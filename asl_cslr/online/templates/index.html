<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL Recognition Pipeline</title>
    <!-- Include Socket.IO client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(25, 30, 45, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 25%);
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(11, 15, 25, 0.8);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
            transition: background-color 0.3s ease;
        }
        
        .dot.connected {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        main {
            flex: 1;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .feed-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-wrapper {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 480px;
        }

        #camera-feed {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            width: 100%;
            height: 100%;
        }

        .placeholder {
            color: var(--text-muted);
            font-size: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .placeholder svg {
            width: 48px;
            height: 48px;
            opacity: 0.5;
        }

        .controls {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.2);
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .panel h2 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .log-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            color: #cbd5e1;
            overflow-y: auto;
            max-height: 300px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .log-entry {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }
        .log-time {
            color: var(--text-muted);
            margin-right: 8px;
        }

        .example-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .example-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.12), rgba(11, 15, 25, 0));
        }

        .drawer-kicker {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .drawer-title {
            font-size: 1.25rem;
            font-weight: 650;
            line-height: 1.1;
        }

        .drawer-video {
            width: 100%;
            border-radius: 16px;
            background: #020617;
            border: 1px solid rgba(255, 255, 255, 0.06);
            aspect-ratio: 16 / 9;
        }

        .drawer-meta {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .drawer-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .example-choice {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 999px;
            padding: 0.5rem 0.85rem;
            font-size: 0.84rem;
            cursor: pointer;
        }

        .example-choice.active {
            background: rgba(59, 130, 246, 0.16);
            border-color: rgba(59, 130, 246, 0.35);
            color: #bfdbfe;
        }

        /* Sign Dictionary Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #131826;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 90%;
            max-width: 520px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }

        .gloss-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 0.5rem;
        }

        .gloss-chip {
            padding: 0.6rem 0.75rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 0.84rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s ease;
        }

        .gloss-chip:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.35);
            transform: translateY(-1px);
        }

        /* Video preview modal (opens on top of dictionary) */
        .video-modal {
            max-width: 480px;
            z-index: 110;
        }

        .video-modal-overlay {
            z-index: 105;
        }

        .video-modal video {
            width: 100%;
            border-radius: 12px;
            background: #000;
            aspect-ratio: 16 / 9;
        }

        .video-modal .modal-body {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .video-modal .clip-chooser {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            ASL Recognizer
            <span class="badge" id="mode-badge">{{ mode }} mode</span>
        </h1>
        <div class="status-pill">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <main>
        <div class="feed-container">
            <div class="video-wrapper">
                <div class="placeholder" id="placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
                    <span>Camera inactive</span>
                </div>
                <img id="camera-feed" alt="Live ASL Feed" />
            </div>
            <div class="controls">
                <button class="btn-primary" id="btn-start" onclick="startCamera()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    Start Camera
                </button>
                <button class="btn-danger" id="btn-stop" onclick="stopCamera()" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                    Stop Camera
                </button>
                <button class="btn-secondary" onclick="resetPipeline()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                    Reset Pipeline
                </button>
                <button class="btn-secondary" onclick="openDictionary()" style="margin-left: auto;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    Sign Dictionary
                </button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <h2>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    Current Sign Example
                </h2>
                <div class="example-panel">
                    <div class="example-header">
                        <div>
                            <div class="drawer-kicker">Autoplaying local WLASL clip</div>
                            <div class="drawer-title" id="example-title">Waiting for a guess</div>
                        </div>
                    </div>
                    <video id="example-video" class="drawer-video" controls autoplay muted loop playsinline preload="metadata"></video>
                    <div class="drawer-meta" id="drawer-meta">
                        The latest detected gloss will load here automatically. Click any gloss chip to inspect a different detected word.
                    </div>
                    <div class="drawer-actions" id="example-actions"></div>
                </div>
            </div>

            <div class="panel" style="flex: 1; display: flex; flex-direction: column;">
                <h2>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                    System Logs
                </h2>
                <div class="log-container" id="system-logs">
                </div>
            </div>
        </div>
    </main>

    <!-- Sign Dictionary Modal -->
    <div class="modal-overlay" id="dict-overlay" onclick="closeDictionary(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Sign Dictionary</h3>
                <button class="modal-close" onclick="closeDictionary()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="gloss-grid" id="dict-grid"></div>
            </div>
        </div>
    </div>

    <!-- Video Preview Modal (on top of dictionary) -->
    <div class="modal-overlay video-modal-overlay" id="video-overlay" onclick="closeVideoModal(event)">
        <div class="modal video-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="video-modal-title">Sign</h3>
                <button class="modal-close" onclick="closeVideoModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <video id="dict-video" controls autoplay muted loop playsinline preload="metadata"></video>
                <div class="clip-chooser" id="dict-clip-chooser"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const logs = document.getElementById('system-logs');
        const feed = document.getElementById('camera-feed');
        const placeholder = document.getElementById('placeholder');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const exampleTitle = document.getElementById('example-title');
        const drawerMeta = document.getElementById('drawer-meta');
        const exampleVideo = document.getElementById('example-video');
        const exampleActions = document.getElementById('example-actions');

        let currentGloss = null;
        let currentExamples = [];
        let currentExampleVideoUrl = null;
        let requestCounter = 0;

        function addLog(msg) {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        socket.on('connect', () => {
            statusDot.classList.add('connected');
            statusText.textContent = 'Connected to Backend';
            addLog('WebSocket connected successfully');
        });

        socket.on('disconnect', () => {
            statusDot.classList.remove('connected');
            statusText.textContent = 'Disconnected';
            addLog('WebSocket disconnected');
            feed.style.display = 'none';
            placeholder.style.display = 'flex';
            btnStart.style.display = 'flex';
            btnStop.style.display = 'none';
        });

        socket.on('status', (data) => {
            addLog(`System: ${data.message}`);
            if (data.message === "Camera started") {
                feed.style.display = 'block';
                placeholder.style.display = 'none';
                btnStart.style.display = 'none';
                btnStop.style.display = 'flex';
            } else if (data.message === "Camera stopped") {
                feed.style.display = 'none';
                placeholder.style.display = 'flex';
                btnStart.style.display = 'flex';
                btnStop.style.display = 'none';
            }
        });

        socket.on('camera_frame', (data) => {
            // Update image source with base64 data
            feed.src = data.image;
        });

        socket.on('glosses', (data) => {
            const seq = data.sequence || [];
            if (seq.length === 0) {
                return;
            }

            const latestGloss = seq[seq.length - 1];
            if (latestGloss && latestGloss !== currentGloss) {
                openGlossExample(latestGloss, { autoAdvance: true });
            }
            addLog(`Decoded: ${seq.join(' ')}`);
        });

        function autoplayExampleVideo() {
            exampleVideo.muted = true;
            const playPromise = exampleVideo.play();
            if (playPromise && typeof playPromise.catch === 'function') {
                playPromise.catch(() => {});
            }
        }

        function renderExampleChoices() {
            exampleActions.innerHTML = '';
            currentExamples.forEach((example, index) => {
                const choice = document.createElement('button');
                choice.type = 'button';
                choice.className = 'example-choice';
                if (example.video_url === currentExampleVideoUrl || (currentExampleVideoUrl === null && index === 0)) {
                    choice.classList.add('active');
                }
                choice.textContent = `${example.split} clip ${example.video_id}`;
                choice.addEventListener('click', () => selectExample(example, choice));
                exampleActions.appendChild(choice);
            });
        }

        function selectExample(example, buttonEl) {
            const nextVideoUrl = example.video_url;
            const shouldReloadVideo = currentExampleVideoUrl !== nextVideoUrl || !exampleVideo.getAttribute('src');
            currentExampleVideoUrl = nextVideoUrl;
            exampleTitle.textContent = currentGloss || 'Detected sign example';
            if (shouldReloadVideo) {
                exampleVideo.pause();
                exampleVideo.src = nextVideoUrl;
                exampleVideo.load();
            }
            drawerMeta.textContent = `Autoplaying ${currentGloss || 'the selected sign'}. Split: ${example.split} | Video ID: ${example.video_id}${example.signer_id !== null && example.signer_id !== undefined ? ` | Signer: ${example.signer_id}` : ''}`;
            exampleActions.querySelectorAll('.example-choice').forEach(node => node.classList.remove('active'));
            if (buttonEl) {
                buttonEl.classList.add('active');
            }
            autoplayExampleVideo();
        }

        async function openGlossExample(gloss, options = {}) {
            if (!gloss) {
                return;
            }
            if (gloss === currentGloss && currentExamples.length > 0 && options.force !== true) {
                exampleTitle.textContent = currentGloss;
                renderExampleChoices();
                if (currentExampleVideoUrl) {
                    autoplayExampleVideo();
                } else {
                    selectExample(currentExamples[0], exampleActions.querySelector('.example-choice'));
                }
                return;
            }

            const token = ++requestCounter;
            currentGloss = gloss;
            currentExampleVideoUrl = null;
            exampleTitle.textContent = gloss;
            drawerMeta.textContent = 'Loading local WLASL examples...';
            exampleActions.innerHTML = '';

            try {
                const response = await fetch(`/api/sign-examples/${encodeURIComponent(gloss)}`);
                if (token !== requestCounter) {
                    return;
                }
                const data = await response.json();
                currentExamples = data.examples || [];

                if (currentExamples.length === 0) {
                    exampleVideo.removeAttribute('src');
                    exampleVideo.load();
                    currentExampleVideoUrl = null;
                    exampleActions.innerHTML = '';
                    drawerMeta.textContent = `No local WLASL clips were found for ${data.canonical_gloss || gloss}.`;
                    return;
                }

                renderExampleChoices();
                selectExample(currentExamples[0], exampleActions.querySelector('.example-choice'));
                if (options.autoAdvance) {
                    drawerMeta.textContent = `Autoplaying the latest guess: ${data.canonical_gloss || gloss}. Use the selector below to swap clips.`;
                    autoplayExampleVideo();
                }
            } catch (error) {
                if (token !== requestCounter) {
                    return;
                }
                console.error(error);
                drawerMeta.textContent = `Failed to load examples for ${gloss}.`;
                exampleActions.innerHTML = '';
                currentExampleVideoUrl = null;
                exampleVideo.removeAttribute('src');
                exampleVideo.load();
            }
        }

        function startCamera() {
            socket.emit('start_camera');
        }

        function stopCamera() {
            socket.emit('stop_camera');
        }

        function resetPipeline() {
            socket.emit('reset');
        }

        // --- Sign Dictionary ---
        const dictOverlay = document.getElementById('dict-overlay');
        const dictGrid = document.getElementById('dict-grid');
        const videoOverlay = document.getElementById('video-overlay');
        const dictVideo = document.getElementById('dict-video');
        const dictClipChooser = document.getElementById('dict-clip-chooser');
        const videoModalTitle = document.getElementById('video-modal-title');
        let dictLoaded = false;

        async function openDictionary() {
            dictOverlay.classList.add('open');
            if (dictLoaded) return;
            try {
                const res = await fetch('/api/vocabulary');
                const data = await res.json();
                dictGrid.innerHTML = '';
                (data.glosses || []).forEach(gloss => {
                    const chip = document.createElement('button');
                    chip.type = 'button';
                    chip.className = 'gloss-chip';
                    chip.textContent = gloss;
                    chip.addEventListener('click', () => openSignVideo(gloss));
                    dictGrid.appendChild(chip);
                });
                dictLoaded = true;
            } catch (err) {
                dictGrid.innerHTML = '<p style="color:var(--text-muted)">Failed to load vocabulary.</p>';
            }
        }

        function closeDictionary(event) {
            if (event && event.target !== dictOverlay) return;
            dictOverlay.classList.remove('open');
        }

        async function openSignVideo(gloss) {
            videoModalTitle.textContent = gloss;
            dictVideo.removeAttribute('src');
            dictVideo.load();
            dictClipChooser.innerHTML = '';
            videoOverlay.classList.add('open');

            try {
                const res = await fetch(`/api/sign-examples/${encodeURIComponent(gloss)}`);
                const data = await res.json();
                const examples = data.examples || [];
                if (examples.length === 0) {
                    dictClipChooser.innerHTML = '<span style="color:var(--text-muted);font-size:0.84rem;">No video clips available for this sign.</span>';
                    return;
                }
                dictVideo.src = examples[0].video_url;
                dictVideo.load();
                dictVideo.muted = true;
                dictVideo.play().catch(() => {});

                examples.forEach((ex, i) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'example-choice' + (i === 0 ? ' active' : '');
                    btn.textContent = `${ex.split} clip ${ex.video_id}`;
                    btn.addEventListener('click', () => {
                        dictVideo.src = ex.video_url;
                        dictVideo.load();
                        dictVideo.muted = true;
                        dictVideo.play().catch(() => {});
                        dictClipChooser.querySelectorAll('.example-choice').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                    dictClipChooser.appendChild(btn);
                });
            } catch (err) {
                dictClipChooser.innerHTML = '<span style="color:var(--text-muted);font-size:0.84rem;">Failed to load examples.</span>';
            }
        }

        function closeVideoModal(event) {
            if (event && event.target !== videoOverlay) return;
            videoOverlay.classList.remove('open');
            dictVideo.pause();
            dictVideo.removeAttribute('src');
            dictVideo.load();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (videoOverlay.classList.contains('open')) {
                    closeVideoModal();
                } else if (dictOverlay.classList.contains('open')) {
                    closeDictionary();
                }
            }
        });
    </script>
</body>
</html>
