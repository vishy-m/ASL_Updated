# CSLR demo training on synthetic sequences built from true WLASL gloss clips.

model:
  type: "cslr"
  input_dim: 208
  frame_feature_dim: 208
  encoder_type: "bilstm"
  conv_dim: 160
  conv_layers: 2
  conv_kernel_size: 5
  conv_dropout: 0.2
  lstm_hidden_size: 160
  lstm_layers: 2
  lstm_dropout: 0.3
  use_motion: false
  multi_scale: false
  dual_stream: false

training:
  epochs: 30
  batch_size: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 3
  grad_clip_norm: 1.0
  t_max: 256
  mixed_precision: true
  amp_dtype: "float16"
  amp_exclude_ctc: true
  pretrained_backbone: "checkpoints/islr_demo_holistic/best.pt"
  freeze_conv_epochs: 2

data:
  train_manifest: "data/processed/demo/manifests/cslr_demo_train.jsonl"
  val_manifest: "data/processed/demo/manifests/cslr_demo_val.jsonl"
  test_manifest: "data/processed/demo/manifests/cslr_demo_test.jsonl"
  vocab_path: "data/processed/demo/manifests/demo_vocab.json"
  num_workers: 4
  pin_memory: false

checkpointing:
  save_dir: "checkpoints/cslr_demo_holistic"
  save_every_n_epochs: 5
  keep_top_k: 3

logging:
  tensorboard_dir: "runs/cslr_demo_holistic"
  log_every_n_steps: 10

evaluation:
  decode_every_n_epochs: 1
  metrics:
    - "wer"
    - "cer"

augmentation:
  enabled: true
  spatial_jitter_std: 0.008
  scale_range: [0.95, 1.05]
  translate_range: 0.03
  temporal_crop_ratio: [0.92, 1.0]
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.03
  speed_perturb_range: [0.92, 1.08]
