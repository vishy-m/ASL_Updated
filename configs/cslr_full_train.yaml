# Broader pseudo-labeled CSLR config built from all tokenized How2Sign sentences.
# This is useful for experiments, while configs/cslr_train.yaml is the default
# goal-aligned shared-vocabulary path for live CSLR.

model:
  type: "cslr"
  input_dim: 364
  frame_feature_dim: 208
  motion_dim: 156
  encoder_type: "bilstm"
  conv_dim: 256
  conv_layers: 3
  conv_kernel_size: 5
  conv_dropout: 0.1
  lstm_hidden_size: 256
  lstm_layers: 2
  lstm_dropout: 0.2
  use_motion: true
  multi_scale: true
  multi_scale_kernels: [3, 5, 9]
  dual_stream: false

training:
  epochs: 12
  batch_size: 12
  learning_rate: 3.0e-4
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  grad_clip_norm: 1.0
  t_max: 256
  mixed_precision: true
  amp_dtype: "float16"
  amp_exclude_ctc: true
  pretrained_backbone: "checkpoints/islr_goal/best.pt"
  freeze_conv_epochs: 2

data:
  train_manifest: "data/processed/manifests/cslr_full_train.jsonl"
  val_manifest: "data/processed/manifests/cslr_full_val.jsonl"
  test_manifest: "data/processed/manifests/cslr_full_test.jsonl"
  vocab_path: "data/processed/manifests/cslr_full_vocab.json"
  num_workers: 8
  pin_memory: false

checkpointing:
  save_dir: "checkpoints/cslr_full"
  save_every_n_epochs: 5
  keep_top_k: 3

logging:
  tensorboard_dir: "runs/cslr_full"
  log_every_n_steps: 50

evaluation:
  decode_every_n_epochs: 1
  metrics:
    - "wer"
    - "cer"

augmentation:
  enabled: true
  spatial_jitter_std: 0.008
  scale_range: [0.95, 1.05]
  rotation_range_deg: [-5.0, 5.0]
  translate_range: 0.03
  temporal_crop_ratio: [0.92, 1.0]
  temporal_drop_ratio: 0.10
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.03
  speed_perturb_range: [0.95, 1.08]
