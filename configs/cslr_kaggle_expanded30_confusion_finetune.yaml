# CSLR fine-tuning from best CSLR checkpoint with confusion-aware loss.
# Targets weak glosses: MOTHER, RED, RIGHT, APPLE, FINE.
# Key difference from confusion_fix: warm-starts from the trained CSLR model
# (not the ISLR backbone), so CTC alignment is already learned.

model:
  type: "cslr"
  input_dim: 364
  frame_feature_dim: 208
  motion_dim: 156
  encoder_type: "bilstm"
  conv_dim: 256
  conv_layers: 3
  conv_kernel_size: 5
  conv_dropout: 0.1
  lstm_hidden_size: 256
  lstm_layers: 2
  lstm_dropout: 0.2
  use_motion: true
  multi_scale: true
  multi_scale_kernels: [3, 5, 9]
  dual_stream: false

training:
  epochs: 20
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 0.03
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 2
  grad_clip_norm: 1.0
  # Warm-start from the best CSLR checkpoint (preserves CTC head + alignment)
  pretrained_cslr: "checkpoints/cslr_kaggle_expanded30_short_motion/best.pt"
  t_max: 320
  mixed_precision: true
  amp_dtype: "float16"
  amp_exclude_ctc: true
  balanced_sampling: true
  # Keep CTC bias settings for reference but they are skipped when loading from CSLR
  ctc_blank_bias_init: -2.5
  ctc_gloss_prior_smoothing: 1.0
  ctc_gloss_prior_scale: 0.35
  ctc_zero_blank_weight_on_init: true
  ctc_special_bias_init: -4.0
  freeze_blank_epochs: 0
  # Confusion-aware loss weighting: gentle boost for weak glosses
  confusion_boost:
    MOTHER: 1.5
    RED: 1.5
    RIGHT: 1.5
    APPLE: 1.3
    FINE: 1.3
    DOG: 1.2
    DEAF: 1.2

data:
  train_manifest: "data/processed/kaggle_expanded30_short/manifests/cslr_demo_train.jsonl"
  val_manifest: "data/processed/kaggle_expanded30_short/manifests/cslr_demo_val.jsonl"
  test_manifest: "data/processed/kaggle_expanded30_short/manifests/cslr_demo_test.jsonl"
  vocab_path: "data/processed/kaggle_expanded30_short/manifests/demo_vocab.json"
  num_workers: 8
  pin_memory: false
  frame_stride: 2

checkpointing:
  save_dir: "checkpoints/cslr_kaggle_confusion_finetune"
  save_every_n_epochs: 4
  keep_top_k: 3

logging:
  tensorboard_dir: "runs/cslr_kaggle_confusion_finetune"
  log_every_n_steps: 25

evaluation:
  decode_every_n_epochs: 1
  metrics:
    - "wer"
    - "cer"

augmentation:
  enabled: true
  spatial_jitter_std: 0.012
  scale_range: [0.90, 1.10]
  rotation_range_deg: [-12.0, 12.0]
  pitch_range_deg: [-14.0, 14.0]
  yaw_range_deg: [-18.0, 18.0]
  translate_range: 0.04
  temporal_crop_ratio: [0.86, 1.0]
  temporal_drop_ratio: 0.07
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.06
  hand_dropout_prob: 0.20
  hand_dropout_ratio: [0.08, 0.28]
  pose_dropout_prob: 0.12
  pose_dropout_ratio: [0.06, 0.18]
  speed_perturb_range: [0.86, 1.14]
  # Inject idle hand when non-signing hand is missing from training data.
  # Bridges the gap with live inference where both hands are always visible.
  idle_hand_inject_prob: 0.5
