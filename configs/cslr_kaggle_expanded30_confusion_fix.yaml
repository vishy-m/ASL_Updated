# CSLR training with confusion-aware sampling and longer training.
# Targets weak glosses: MOTHER, RED, RIGHT, APPLE, FINE.
# Based on cslr_kaggle_expanded30_short_motion_train.yaml with:
#   - More epochs (12 vs 6) with lower LR for fine-tuning
#   - Confusion-boosted sampling to oversample sequences with weak glosses
#   - Warm start from the current best checkpoint instead of ISLR backbone
#   - Slightly stronger augmentation on temporal domain

model:
  type: "cslr"
  input_dim: 364
  frame_feature_dim: 208
  motion_dim: 156
  encoder_type: "bilstm"
  conv_dim: 256
  conv_layers: 3
  conv_kernel_size: 5
  conv_dropout: 0.1
  lstm_hidden_size: 256
  lstm_layers: 2
  lstm_dropout: 0.2
  use_motion: true
  multi_scale: true
  multi_scale_kernels: [3, 5, 9]
  dual_stream: false

training:
  epochs: 12
  batch_size: 8
  learning_rate: 2.0e-5
  weight_decay: 0.03
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 2
  grad_clip_norm: 1.0
  pretrained_backbone: "checkpoints/islr_kaggle_expanded30/best.pt"
  t_max: 320
  mixed_precision: true
  amp_dtype: "float16"
  amp_exclude_ctc: true
  balanced_sampling: true
  ctc_blank_bias_init: -2.5
  ctc_gloss_prior_smoothing: 1.0
  ctc_gloss_prior_scale: 0.35
  ctc_zero_blank_weight_on_init: true
  ctc_special_bias_init: -4.0
  freeze_blank_epochs: 1
  # Confusion-aware loss weighting: boost sequences containing weak glosses
  confusion_boost:
    MOTHER: 2.0
    RED: 2.0
    RIGHT: 2.0
    APPLE: 1.5
    FINE: 1.5
    DOG: 1.3
    DEAF: 1.3

data:
  train_manifest: "data/processed/kaggle_expanded30_short/manifests/cslr_demo_train.jsonl"
  val_manifest: "data/processed/kaggle_expanded30_short/manifests/cslr_demo_val.jsonl"
  test_manifest: "data/processed/kaggle_expanded30_short/manifests/cslr_demo_test.jsonl"
  vocab_path: "data/processed/kaggle_expanded30_short/manifests/demo_vocab.json"
  num_workers: 8
  pin_memory: false
  frame_stride: 2

checkpointing:
  save_dir: "checkpoints/cslr_kaggle_confusion_fix"
  save_every_n_epochs: 2
  keep_top_k: 3

logging:
  tensorboard_dir: "runs/cslr_kaggle_confusion_fix"
  log_every_n_steps: 25

evaluation:
  decode_every_n_epochs: 1
  metrics:
    - "wer"
    - "cer"

augmentation:
  enabled: true
  spatial_jitter_std: 0.014
  scale_range: [0.88, 1.12]
  rotation_range_deg: [-14.0, 14.0]
  pitch_range_deg: [-16.0, 16.0]
  yaw_range_deg: [-20.0, 20.0]
  translate_range: 0.05
  temporal_crop_ratio: [0.82, 1.0]
  temporal_drop_ratio: 0.08
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.07
  hand_dropout_prob: 0.22
  hand_dropout_ratio: [0.08, 0.30]
  pose_dropout_prob: 0.14
  pose_dropout_ratio: [0.06, 0.20]
  speed_perturb_range: [0.84, 1.16]
