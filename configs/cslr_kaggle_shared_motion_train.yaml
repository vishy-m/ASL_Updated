# CSLR training on shared WLASL + ASL Citizen isolated-sign sources.

model:
  type: "cslr"
  input_dim: 364
  frame_feature_dim: 208
  motion_dim: 156
  encoder_type: "bilstm"
  conv_dim: 192
  conv_layers: 2
  conv_kernel_size: 5
  conv_dropout: 0.25
  lstm_hidden_size: 192
  lstm_layers: 2
  lstm_dropout: 0.35
  use_motion: true
  multi_scale: false
  dual_stream: false

training:
  epochs: 6
  batch_size: 8
  learning_rate: 6.0e-5
  weight_decay: 0.02
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 2
  grad_clip_norm: 1.0
  pretrained_backbone: "checkpoints/cslr_live_product_motion/best.pt"
  t_max: 320
  mixed_precision: true
  amp_dtype: "float16"
  amp_exclude_ctc: true
  balanced_sampling: true

data:
  train_manifest: "data/processed/kaggle_shared/manifests/cslr_demo_train.jsonl"
  val_manifest: "data/processed/kaggle_shared/manifests/cslr_demo_val.jsonl"
  test_manifest: "data/processed/kaggle_shared/manifests/cslr_demo_test.jsonl"
  vocab_path: "data/processed/kaggle_shared/manifests/demo_vocab.json"
  num_workers: 4
  pin_memory: false

checkpointing:
  save_dir: "checkpoints/cslr_kaggle_shared_motion"
  save_every_n_epochs: 2
  keep_top_k: 3

logging:
  tensorboard_dir: "runs/cslr_kaggle_shared_motion"
  log_every_n_steps: 25

evaluation:
  decode_every_n_epochs: 1
  metrics:
    - "wer"
    - "cer"

augmentation:
  enabled: true
  spatial_jitter_std: 0.01
  scale_range: [0.92, 1.08]
  rotation_range_deg: [-10.0, 10.0]
  pitch_range_deg: [-12.0, 12.0]
  yaw_range_deg: [-16.0, 16.0]
  translate_range: 0.035
  temporal_crop_ratio: [0.88, 1.0]
  temporal_drop_ratio: 0.06
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.05
  hand_dropout_prob: 0.18
  hand_dropout_ratio: [0.08, 0.24]
  pose_dropout_prob: 0.10
  pose_dropout_ratio: [0.05, 0.16]
  speed_perturb_range: [0.88, 1.12]
