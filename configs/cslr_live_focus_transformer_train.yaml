# Transformer-based focused CSLR training for confusing live signs.

model:
  type: "cslr"
  input_dim: 364
  frame_feature_dim: 208
  motion_dim: 156
  encoder_type: "transformer"
  conv_dim: 160
  conv_layers: 2
  conv_kernel_size: 5
  conv_dropout: 0.25
  lstm_hidden_size: 160
  lstm_layers: 2
  lstm_dropout: 0.30
  transformer_hidden: 256
  transformer_layers: 4
  transformer_heads: 4
  use_motion: true
  multi_scale: true
  multi_scale_kernels: [3, 5, 9]
  dual_stream: false

training:
  epochs: 8
  batch_size: 6
  learning_rate: 1.5e-4
  weight_decay: 0.03
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 2
  grad_clip_norm: 1.0
  t_max: 192
  mixed_precision: true
  amp_dtype: "float16"
  amp_exclude_ctc: true

data:
  train_manifest: "data/processed/live_focus/manifests/cslr_demo_train.jsonl"
  val_manifest: "data/processed/live_focus/manifests/cslr_demo_val.jsonl"
  test_manifest: "data/processed/live_focus/manifests/cslr_demo_test.jsonl"
  vocab_path: "data/processed/live_focus/manifests/demo_vocab.json"
  num_workers: 4
  pin_memory: false

checkpointing:
  save_dir: "checkpoints/cslr_live_focus_transformer"
  save_every_n_epochs: 4
  keep_top_k: 3

logging:
  tensorboard_dir: "runs/cslr_live_focus_transformer"
  log_every_n_steps: 10

evaluation:
  decode_every_n_epochs: 1
  metrics:
    - "wer"
    - "cer"

augmentation:
  enabled: true
  spatial_jitter_std: 0.010
  scale_range: [0.92, 1.08]
  rotation_range_deg: [-10.0, 10.0]
  pitch_range_deg: [-10.0, 10.0]
  yaw_range_deg: [-18.0, 18.0]
  translate_range: 0.04
  temporal_crop_ratio: [0.88, 1.0]
  temporal_drop_ratio: 0.06
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.04
  hand_dropout_prob: 0.18
  hand_dropout_ratio: [0.10, 0.28]
  pose_dropout_prob: 0.08
  pose_dropout_ratio: [0.06, 0.16]
  speed_perturb_range: [0.88, 1.12]
