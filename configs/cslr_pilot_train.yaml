# Continuous Sign Language Recognition (CSLR) Pilot Training Config
# Uses the shared pilot vocabulary and deterministic How2Sign pseudo-labels.

model:
  type: "cslr"
  input_dim: 208
  frame_feature_dim: 208
  encoder_type: "bilstm"
  conv_dim: 192
  conv_layers: 2
  conv_kernel_size: 5
  conv_dropout: 0.2
  lstm_hidden_size: 192
  lstm_layers: 2
  lstm_dropout: 0.25
  use_motion: false
  multi_scale: false
  dual_stream: false

training:
  epochs: 15
  batch_size: 4
  learning_rate: 3.0e-4
  weight_decay: 0.02
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 2
  grad_clip_norm: 1.0
  t_max: 256
  mixed_precision: true
  amp_dtype: "float16"
  amp_exclude_ctc: true
  pretrained_backbone: "checkpoints/islr_pilot/epoch_020.pt"
  freeze_conv_epochs: 2

data:
  train_manifest: "data/processed/pilot/manifests/cslr_pilot_train.jsonl"
  val_manifest: "data/processed/pilot/manifests/cslr_pilot_val.jsonl"
  test_manifest: "data/processed/pilot/manifests/cslr_pilot_test.jsonl"
  vocab_path: "data/processed/pilot/manifests/pilot_vocab.json"
  num_workers: 4
  pin_memory: false

checkpointing:
  save_dir: "checkpoints/cslr_pilot"
  save_every_n_epochs: 5
  keep_top_k: 3

logging:
  tensorboard_dir: "runs/cslr_pilot"
  log_every_n_steps: 10

evaluation:
  decode_every_n_epochs: 2
  metrics:
    - "wer"
    - "cer"

augmentation:
  enabled: true
  spatial_jitter_std: 0.008
  scale_range: [0.95, 1.05]
  translate_range: 0.03
  temporal_crop_ratio: [0.94, 1.0]
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.03
  speed_perturb_range: [0.94, 1.06]
