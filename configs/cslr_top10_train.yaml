# Continuous Sign Language Recognition (CSLR) Training Config — Top-10 Words
# Stage 2: CTC-based continuous recognition on How2Sign (filtered to top-10 words)

model:
  type: "cslr"
  input_dim: 208
  frame_feature_dim: 208
  encoder_type: "bilstm"
  conv_dim: 256                   # Match ISLR backbone
  conv_layers: 2
  conv_kernel_size: 5
  conv_dropout: 0.2
  lstm_hidden_size: 256
  lstm_layers: 2
  lstm_dropout: 0.3
  use_motion: false
  multi_scale: false

training:
  epochs: 30                      # Reduced for ~5K samples
  batch_size: 16                  # Larger batch for stability
  learning_rate: 3.0e-4
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 3
  grad_clip_norm: 1.0
  t_max: 256

  mixed_precision: true
  amp_dtype: "float16"
  amp_exclude_ctc: true

  # Backbone from top-10 ISLR
  pretrained_backbone: "checkpoints/islr_top10/best.pt"
  freeze_conv_epochs: 2

data:
  train_manifest: "data/processed/manifests/cslr_top10_train.jsonl"
  val_manifest: "data/processed/manifests/cslr_top10_val.jsonl"
  test_manifest: "data/processed/manifests/cslr_top10_test.jsonl"
  vocab_path: "data/processed/manifests/cslr_top10_vocab.json"
  num_workers: 8
  pin_memory: false

checkpointing:
  save_dir: "checkpoints/cslr_top10"
  save_every_n_epochs: 5
  keep_top_k: 3

logging:
  tensorboard_dir: "runs/cslr_top10"
  log_every_n_steps: 50

evaluation:
  decode_every_n_epochs: 5
  metrics:
    - "wer"
    - "cer"

augmentation:
  enabled: true
  spatial_jitter_std: 0.008
  scale_range: [0.94, 1.06]
  translate_range: 0.03
  temporal_crop_ratio: [0.92, 1.0]
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.03
  speed_perturb_range: [0.9, 1.08]
