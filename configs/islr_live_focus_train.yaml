# Accuracy-first live ISLR training on a focused WLASL vocabulary.

model:
  type: "islr"
  input_dim: 208
  frame_feature_dim: 208
  encoder_type: "bilstm"
  conv_dim: 160
  conv_layers: 2
  conv_kernel_size: 5
  conv_dropout: 0.15
  lstm_hidden_size: 160
  lstm_layers: 2
  lstm_dropout: 0.15
  fc_dropout: 0.2
  pool: "mean"
  use_motion: false

training:
  epochs: 20
  batch_size: 8
  learning_rate: 3.0e-4
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 4
  grad_clip_norm: 1.0
  mixed_precision: true
  amp_dtype: "float16"

data:
  train_manifest: "data/processed/live_focus/manifests/islr_demo_train.jsonl"
  val_manifest: "data/processed/live_focus/manifests/islr_demo_val.jsonl"
  test_manifest: "data/processed/live_focus/manifests/islr_demo_test.jsonl"
  vocab_path: "data/processed/live_focus/manifests/demo_vocab.json"
  num_workers: 4
  pin_memory: false

checkpointing:
  save_dir: "checkpoints/islr_live_focus"
  save_every_n_epochs: 5
  keep_top_k: 3
  selection_metric: "macro_accuracy"

logging:
  tensorboard_dir: "runs/islr_live_focus"
  log_every_n_steps: 10

evaluation:
  metrics:
    - "top1_accuracy"
    - "top5_accuracy"
    - "macro_accuracy"

augmentation:
  enabled: true
  spatial_jitter_std: 0.012
  scale_range: [0.9, 1.1]
  rotation_range_deg: [-7.0, 7.0]
  translate_range: 0.05
  temporal_crop_ratio: [0.82, 1.0]
  temporal_drop_ratio: 0.08
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.05
  speed_perturb_range: [0.85, 1.15]
