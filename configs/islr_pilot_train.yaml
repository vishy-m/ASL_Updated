# Isolated Sign Language Recognition (ISLR) Pilot Training Config
# Deterministic shared-vocabulary pilot for end-to-end pipeline checks.

model:
  type: "islr"
  input_dim: 208
  frame_feature_dim: 208
  encoder_type: "bilstm"
  conv_dim: 192
  conv_layers: 2
  conv_kernel_size: 5
  conv_dropout: 0.2
  lstm_hidden_size: 192
  lstm_layers: 2
  lstm_dropout: 0.25
  fc_dropout: 0.3
  pool: "last"
  use_motion: false

training:
  epochs: 20
  batch_size: 8
  learning_rate: 5.0e-4
  weight_decay: 0.02
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 3
  grad_clip_norm: 1.0
  mixed_precision: true
  amp_dtype: "float16"

data:
  train_manifest: "data/processed/pilot/manifests/islr_pilot_train.jsonl"
  val_manifest: "data/processed/pilot/manifests/islr_pilot_val.jsonl"
  test_manifest: "data/processed/pilot/manifests/islr_pilot_test.jsonl"
  vocab_path: "data/processed/pilot/manifests/pilot_vocab.json"
  num_workers: 4
  pin_memory: false

checkpointing:
  save_dir: "checkpoints/islr_pilot"
  save_every_n_epochs: 5
  keep_top_k: 3
  selection_metric: "macro_accuracy"

logging:
  tensorboard_dir: "runs/islr_pilot"
  log_every_n_steps: 10

evaluation:
  metrics:
    - "top1_accuracy"
    - "top5_accuracy"
    - "macro_accuracy"

augmentation:
  enabled: true
  spatial_jitter_std: 0.01
  scale_range: [0.9, 1.1]
  translate_range: 0.05
  temporal_crop_ratio: [0.8, 1.0]
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.05
  speed_perturb_range: [0.8, 1.2]
