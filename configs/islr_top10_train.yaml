# Isolated Sign Language Recognition (ISLR) Training Config — Top-10 Glosses
# Reduced problem: 10 most frequent WLASL glosses for fast iteration

model:
  type: "islr"
  input_dim: 208                  # 52 joints × (x, y, z, observed_mask)
  frame_feature_dim: 208
  encoder_type: "bilstm"
  conv_dim: 256                   # Smaller for 10-class problem
  conv_layers: 2
  conv_kernel_size: 5
  conv_dropout: 0.2               # More dropout to prevent overfitting
  lstm_hidden_size: 256
  lstm_layers: 2
  lstm_dropout: 0.3
  fc_dropout: 0.4                 # Aggressive dropout for small dataset
  pool: "last"                    # Use the final valid timestep for classification
  use_motion: false

training:
  epochs: 100                     # More epochs since dataset is tiny
  batch_size: 8                   # Small batches for 51 samples
  learning_rate: 5.0e-4
  weight_decay: 0.05              # Strong regularisation for small dataset
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  grad_clip_norm: 1.0
  mixed_precision: true
  amp_dtype: "float16"

data:
  train_manifest: "data/processed/manifests/islr_top10_train.jsonl"
  val_manifest: "data/processed/manifests/islr_top10_val.jsonl"
  test_manifest: "data/processed/manifests/islr_top10_test.jsonl"
  vocab_path: "data/processed/manifests/islr_top10_vocab.json"
  num_workers: 4
  pin_memory: false

checkpointing:
  save_dir: "checkpoints/islr_top10"
  save_every_n_epochs: 10
  keep_top_k: 3

logging:
  tensorboard_dir: "runs/islr_top10"
  log_every_n_steps: 10

evaluation:
  metrics:
    - "top1_accuracy"
    - "top5_accuracy"

augmentation:
  enabled: true
  spatial_jitter_std: 0.015       # Slightly more augmentation
  scale_range: [0.85, 1.15]
  translate_range: 0.08
  temporal_crop_ratio: [0.7, 1.0]
  flip_prob: 0.0
  allow_horizontal_flip: false
  joint_dropout_prob: 0.08
  speed_perturb_range: [0.75, 1.25]
